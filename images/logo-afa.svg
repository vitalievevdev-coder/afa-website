<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140" width="380" height="140">
  <defs>
    <linearGradient id="scutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aurGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8a84b;stop-opacity:1" />
    </linearGradient>
    <filter id="umbra">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- tot continutul e centrat: 24px margine stanga, ~25px margine dreapta -->
  <g transform="translate(19, 0)">

    <!-- SCUT (centru la x=54) -->
    <path d="M24 10 L84 10 L84 75 Q84 110 54 125 Q24 110 24 75 Z"
          fill="url(#scutGrad)" filter="url(#umbra)" />
    <path d="M24 10 L84 10 L84 75 Q84 110 54 125 Q24 110 24 75 Z"
          fill="none" stroke="url(#aurGrad)" stroke-width="2.5" />
    <path d="M31 17 L77 17 L77 74 Q77 103 54 116 Q31 103 31 74 Z"
          fill="none" stroke="rgba(200,168,75,0.25)" stroke-width="1.5" />

    <!-- AFA în scut -->
    <text x="54" y="82"
          font-family="Georgia, serif"
          font-size="38"
          font-weight="900"
          fill="url(#aurGrad)"
          text-anchor="middle"
          letter-spacing="-1">AFA</text>
    <line x1="37" y1="90" x2="71" y2="90" stroke="#c8a84b" stroke-width="1.2" opacity="0.6"/>
    <circle cx="39" cy="26" r="2" fill="#c8a84b" opacity="0.7"/>
    <circle cx="69" cy="26" r="2" fill="#c8a84b" opacity="0.7"/>


    <!-- TEXT (începe la x=103) -->
    <text x="103" y="50"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="27"
          font-weight="900"
          fill="#0a2342"
          letter-spacing="0.5"
          textLength="252"
          lengthAdjust="spacing">Anti-Fraud Alliance</text>

    <!-- Linie aurie exact cât textul -->
    <rect x="103" y="59" width="252" height="3" fill="url(#aurGrad)" rx="2"/>

    <text x="103" y="82"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="12"
          fill="#555555"
          letter-spacing="3">ASOCIAȚIA OBSTEASCĂ</text>

    <text x="103" y="106"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="11"
          fill="#c8a84b"
          font-style="italic"
          letter-spacing="0.5">„Protejăm. Informăm. Acționăm."</text>

  </g>
</svg>
