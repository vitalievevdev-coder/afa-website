    <path d="M20 17 L88 17 L88 74 Q88 103 54 116 Q20 103 20 74 Z"
          fill="none" stroke="rgba(200,168,75,0.3)" stroke-width="1.5" />

    <!-- AFA în scut -->
    <text x="54" y="82"
          font-family="Georgia, serif"
          font-size="38"
          font-weight="900"
          fill="url(#aurGrad2)"
          text-anchor="middle"
          letter-spacing="-1">AFA</text>
    <line x1="30" y1="90" x2="78" y2="90" stroke="#c8a84b" stroke-width="1.2" opacity="0.6"/>
    <circle cx="32" cy="26" r="2" fill="#c8a84b" opacity="0.7"/>
    <circle cx="76" cy="26" r="2" fill="#c8a84b" opacity="0.7"/>


    <!-- TEXT alb -->
    <text x="103" y="50"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="27"
          font-weight="900"
          fill="#ffffff"
          letter-spacing="0.5"
          textLength="252"
          lengthAdjust="spacing">Anti-Fraud Alliance</text>

    <!-- Linie aurie exact cât textul -->
    <rect x="103" y="59" width="252" height="3" fill="url(#aurGrad2)" rx="2"/>

    <text x="103" y="82"
          font-family="'Segoe UI', Arial, sans-serif"
